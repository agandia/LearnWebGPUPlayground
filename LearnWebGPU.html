<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Playground (WebGPU)</title>
  <style>
    /* Full-page canvas with black background */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background-color: black;
    }

    /* WIP badge */
    #wip-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px 10px;
      background-color: rgba(255, 0, 0, 0.8);
      color: white;
      font-family: sans-serif;
      font-size: 12px;
      font-weight: bold;
      border-radius: 4px;
      z-index: 9999;
      pointer-events: none; /* so it doesn’t block mouse events on the canvas */
    }
  </style>
</head>
<body>
  <!-- Emscripten module will automatically attach to this canvas -->
  <canvas id="canvas"></canvas>

  <!-- Work-in-progress badge -->
  <div id="wip-badge">WIP</div>

  <script type="text/javascript">
    var Module = {
      print: (function() {})(),
      canvas: (() => {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener("webglcontextlost", (e) => { 
          alert('WebGL context lost. You will need to reload the page.'); 
          e.preventDefault(); 
        }, false);
        return canvas;
      })(),
      setStatus: (text) => {
        if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
        if (text === Module.setStatus.last.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - Module.setStatus.last.time < 30) return; // skip too-frequent updates
        Module.setStatus.last.time = now;
        Module.setStatus.last.text = text;
        if (m) text = m[1];
      },
      totalDependencies: 0,
      monitorRunDependencies: (left) => {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
      }
    };
    Module.setStatus('Downloading...');
    window.onerror = (event) => {
      Module.setStatus('Exception thrown, see JavaScript console');
      Module.setStatus = (text) => { if (text) console.error('[post-exception status] ' + text); };
    };
  </script>

  <!-- Placeholder for Emscripten-generated JS glue -->
  <script async type="text/javascript" src="LearnWebGPU.js"></script>
</body>
</html>
